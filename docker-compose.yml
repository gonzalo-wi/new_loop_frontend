services:
  web:
    build:
      context: .
      args:
        # Baked into the bundle at build time; rebuild to change it.
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    image: loop-front:latest
    ports:
      - "8080:80"
    environment:
      # Swapped at runtime by nginx; no rebuild needed.
      BACKEND_URL: ${BACKEND_URL:-http://192.168.0.42:8095}
      # Upper bound for the APK upload; nginx 413s anything bigger.
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-256m}
    restart: unless-stopped
